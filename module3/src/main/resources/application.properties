# UTF-8

spring.application.name=module3
#spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.url=jdbc:h2:file:./h2-database/testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# dsfsdf
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
# asdasd
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# asdasd
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.security.user.password=abc123


spring.kafka.bootstrap-servers=kafka:9092
#spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# sad

# Opcjonalnie: typowy setup konsumenta
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=org.example.module3.dto.ReportRequestedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.group-id=test-grupa-statyczna
spring.kafka.consumer.auto-offset-reset=earliest
